<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际日志 | Blog</title>
    <meta name="description" content="MY PLANET 博客 - 分享前端开发、AI、设计等技术文章和生活随笔">
    <meta name="keywords" content="博客,前端开发,JavaScript,React,Vue,Node.js,生活随笔">
    <meta name="author" content="MY PLANET">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/glass-nav.css">
    <link rel="stylesheet" href="css/effects.css">
    <link rel="stylesheet" href="css/blog.css">
</head>
<body>
    <div id="starfield"></div>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="scanline"></div>

    <nav>
        <a href="index.html" class="logo">MY PLANET</a>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="index.html#home">首页</a></li>
                <li><a href="index.html#about">关于</a></li>
                <li><a href="index.html#skills">技能</a></li>
                <li><a href="blog.html" class="active">日志</a></li>
                <li><a href="admin.html">控制台</a></li>
                <li><a href="index.html#contact">联系</a></li>
            </ul>
            <a href="feed.html" class="rss-link" title="RSS 订阅">📡</a>
            <button class="theme-toggle" id="themeToggle" onclick="ThemeManager.toggle()">☀️</button>
        </div>
    </nav>

    <div class="page-header">
        <h1>// STAR LOG</h1>
        <p>INTERSTELLAR TRANSMISSIONS & THOUGHTS</p>
    </div>

    <div class="blog-controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索日志...">
        </div>
        <div class="sort-box">
            <select id="sortSelect" class="sort-select">
                <option value="date">按时间排序</option>
                <option value="views">按阅读量排序</option>
            </select>
        </div>
        <div class="view-switcher">
            <button class="view-btn active" data-view="timeline">时间树</button>
            <button class="view-btn" data-view="list">列表</button>
        </div>
        <div class="tag-filters">
            <button class="tag-btn active" data-tag="all">ALL</button>
            <button class="tag-btn" data-tag="tech">TECH</button>
            <button class="tag-btn" data-tag="life">LIFE</button>
            <button class="tag-btn" data-tag="ai">AI</button>
            <button class="tag-btn" data-tag="design">DESIGN</button>
        </div>
    </div>

    <div class="posts-container" id="postsContainer"></div>

    <div class="pagination" id="pagination"></div>

    <footer>
        <p>&copy; 2026 MY PLANET &mdash; ALL RIGHTS RESERVED</p>
    </footer>

    <script src="js/core/utils.js"></script>
    <script src="js/core/stars.js"></script>
    <script src="js/core/effects.js"></script>
    <script src="js/core/bg.js"></script>
    <script src="js/core/theme.js"></script>
    <script src="js/core/animations.js"></script>
    <script src="js/core/glass-nav.js"></script>
    <script src="js/blog.js"></script>
    <script>ThemeManager.init(); Animations.init();</script>
</body>
</html>
