<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际日志 | Blog</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(ellipse at 20% 50%, #0a0e2a 0%, #000 70%);
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        nav {
            position: fixed;
            top: 0; width: 100%;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00f0ff, #a855f7, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0; width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00f0ff, #a855f7);
            transition: width 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #00f0ff;
        }

        .nav-links a:hover::after, .nav-links a.active::after {
            width: 100%;
        }

        .page-header {
            padding: 140px 50px 60px;
            text-align: center;
        }

        .page-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, #00f0ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .page-header p {
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
        }

        /* 搜索与分类 */
        .blog-controls {
            max-width: 900px;
            margin: 0 auto 50px;
            padding: 0 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 45px;
            background: rgba(0,240,255,0.03);
            border: 1px solid rgba(0,240,255,0.15);
            border-radius: 50px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .search-box input:focus {
            border-color: rgba(0,240,255,0.5);
            box-shadow: 0 0 20px rgba(0,240,255,0.1);
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
        }

        .tag-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .tag-btn {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid rgba(0,240,255,0.15);
            border-radius: 50px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .tag-btn:hover, .tag-btn.active {
            background: rgba(0,240,255,0.1);
            border-color: #00f0ff;
            color: #00f0ff;
        }

        /* 文章列表 */
        .posts-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .post-card {
            background: linear-gradient(135deg, rgba(0,240,255,0.03) 0%, rgba(168,85,247,0.03) 100%);
            border: 1px solid rgba(0,240,255,0.1);
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 0;
            background: linear-gradient(180deg, #00f0ff, #a855f7);
            transition: height 0.4s;
        }

        .post-card:hover {
            transform: translateY(-3px);
            border-color: rgba(0,240,255,0.3);
            box-shadow: 0 15px 50px rgba(0,200,255,0.08);
        }

        .post-card:hover::before {
            height: 100%;
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .post-date {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: #a855f7;
            letter-spacing: 1px;
        }

        .post-tags {
            display: flex;
            gap: 8px;
        }

        .post-tag {
            padding: 3px 10px;
            background: rgba(0,240,255,0.08);
            border: 1px solid rgba(0,240,255,0.15);
            border-radius: 20px;
            font-size: 0.7rem;
            color: rgba(0,255,240,0.7);
        }

        .post-read-time {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            margin-left: auto;
        }

        .post-card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 12px;
            transition: color 0.3s;
        }

        .post-card:hover h2 {
            color: #00f0ff;
        }

        .post-excerpt {
            color: rgba(255,255,255,0.5);
            line-height: 1.8;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .read-more {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: #00f0ff;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .read-more::after {
            content: '→';
            transition: transform 0.3s;
        }

        .post-card:hover .read-more::after {
            transform: translateX(5px);
        }

        /* 加载更多 */
        .load-more {
            text-align: center;
            margin-top: 40px;
        }

        .load-more-btn {
            padding: 14px 40px;
            background: transparent;
            border: 1px solid rgba(0,240,255,0.3);
            border-radius: 50px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        .load-more-btn:hover {
            background: rgba(0,240,255,0.1);
            border-color: #00f0ff;
            box-shadow: 0 0 30px rgba(0,240,255,0.15);
        }

        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,240,255,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
            transform: translate(-50%, -50%);
            transition: left 0.15s ease, top 0.15s ease;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
        }

        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.3);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            .nav-links { gap: 15px; }
            .nav-links a { font-size: 0.75rem; }
            .page-header h1 { font-size: 1.8rem; }
            .page-header { padding: 120px 20px 40px; }
            .post-card { padding: 25px; }
            .post-read-time { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div id="starfield"></div>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="scanline"></div>

    <nav>
        <a href="index.html" class="logo">MY PLANET</a>
        <ul class="nav-links">
            <li><a href="index.html#home">首页</a></li>
            <li><a href="index.html#about">关于</a></li>
            <li><a href="index.html#skills">技能</a></li>
            <li><a href="blog.html" class="active">日志</a></li>
            <li><a href="index.html#contact">联系</a></li>
        </ul>
    </nav>

    <div class="page-header">
        <h1>// STAR LOG</h1>
        <p>INTERSTELLAR TRANSMISSIONS & THOUGHTS</p>
    </div>

    <div class="blog-controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索日志...">
        </div>
        <div class="tag-filters">
            <button class="tag-btn active" data-tag="all">ALL</button>
            <button class="tag-btn" data-tag="tech">TECH</button>
            <button class="tag-btn" data-tag="life">LIFE</button>
            <button class="tag-btn" data-tag="ai">AI</button>
            <button class="tag-btn" data-tag="design">DESIGN</button>
        </div>
    </div>

    <div class="posts-container" id="postsContainer">
        <!-- 文章通过 JS 渲染 -->
    </div>

    <footer>
        <p>© 2026 MY PLANET — ALL RIGHTS RESERVED</p>
    </footer>

    <script>
        const posts = [
            {
                id: 'first-post',
                title: '星际航行的第一步：从零搭建个人星球',
                date: '2026.06.11',
                tags: ['tech', 'design'],
                readTime: '5 min',
                excerpt: '在数字宇宙中创建一颗属于自己的星球需要什么？本文记录了从构思到实现的完整过程，包括设计理念、技术选型和那些深夜debug的故事。',
            },
            {
                id: 'ai-revolution',
                title: 'AI 时代的编程：当代码开始自我进化',
                date: '2026.05.28',
                tags: ['ai', 'tech'],
                readTime: '8 min',
                excerpt: '大语言模型正在重新定义软件开发的边界。从 Copilot 到全自动编码agent，我们正站在一场技术革命的起点。探讨AI辅助编程的现状与未来。',
            },
            {
                id: 'minimal-design',
                title: '极简主义的设计哲学：Less is More',
                date: '2026.05.15',
                tags: ['design'],
                readTime: '6 min',
                excerpt: '在信息过载的时代，如何通过极简设计让用户聚焦于内容本身？分享我在UI/UX设计中对留白、层次和色彩的理解。',
            },
            {
                id: 'remote-work',
                title: '远程工作两年：我的数字游牧生活',
                date: '2026.04.20',
                tags: ['life'],
                readTime: '7 min',
                excerpt: '从咖啡厅到共享办公空间，从清晨到深夜，两年的远程工作让我重新定义了工作与生活的边界。这是关于自律、效率和自由的真实记录。',
            },
            {
                id: 'web3-future',
                title: 'Web3 是泡沫还是未来？一个开发者的观察',
                date: '2026.03.10',
                tags: ['tech'],
                readTime: '9 min',
                excerpt: '剥离炒作与泡沫，从技术架构和用户体验的角度重新审视Web3。智能合约、去中心化存储、DID——哪些技术真正有价值？',
            },
        ];

        const container = document.getElementById('postsContainer');
        const searchInput = document.getElementById('searchInput');
        let currentTag = 'all';

        function renderPosts(filter = 'all', search = '') {
            let filtered = posts;
            if (filter !== 'all') {
                filtered = filtered.filter(p => p.tags.includes(filter));
            }
            if (search) {
                const q = search.toLowerCase();
                filtered = filtered.filter(p =>
                    p.title.toLowerCase().includes(q) ||
                    p.excerpt.toLowerCase().includes(q) ||
                    p.tags.some(t => t.includes(q))
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🛸</div>
                        <p>未找到匹配的日志记录</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(post => `
                <a href="posts/${post.id}.html" class="post-card">
                    <div class="post-meta">
                        <span class="post-date">${post.date}</span>
                        <div class="post-tags">
                            ${post.tags.map(t => `<span class="post-tag">${t.toUpperCase()}</span>`).join('')}
                        </div>
                        <span class="post-read-time">⏱ ${post.readTime}</span>
                    </div>
                    <h2>${post.title}</h2>
                    <p class="post-excerpt">${post.excerpt}</p>
                    <span class="read-more">READ MORE</span>
                </a>
            `).join('');
        }

        renderPosts();

        // 标签筛选
        document.querySelectorAll('.tag-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTag = btn.dataset.tag;
                renderPosts(currentTag, searchInput.value);
            });
        });

        // 搜索
        searchInput.addEventListener('input', () => {
            renderPosts(currentTag, searchInput.value);
        });

        // 星空
        (function() {
            const field = document.getElementById('starfield');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2.5 + 0.5;
                star.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${Math.random()*3+1}s;animation-delay:${Math.random()*3}s;`;
                field.appendChild(star);
            }
        })();

        const glow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', e => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
