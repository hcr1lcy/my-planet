<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 | Post</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: #000; color: #fff; overflow-x: hidden; min-height: 100vh; }
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(ellipse at 20% 50%, #0a0e2a 0%, #000 70%); }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

        nav { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); backdrop-filter: blur(10px); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, #00f0ff, #a855f7, #ff006e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; text-decoration: none; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s; position: relative; }
        .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #00f0ff, #a855f7); transition: width 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #00f0ff; }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }

        .article-header { padding: 140px 20px 60px; max-width: 750px; margin: 0 auto; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.85rem; margin-bottom: 30px; transition: color 0.3s; }
        .back-link:hover { color: #00f0ff; }
        .article-meta { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .article-date { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: #a855f7; }
        .article-tags { display: flex; gap: 8px; }
        .article-tag { padding: 4px 12px; background: rgba(0,240,255,0.08); border: 1px solid rgba(0,240,255,0.15); border-radius: 20px; font-size: 0.75rem; color: rgba(0,255,240,0.7); }
        .article-header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; background: linear-gradient(135deg, #00f0ff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.4; margin-bottom: 20px; }

        .article-content { max-width: 750px; margin: 0 auto; padding: 0 20px 60px; line-height: 2; color: rgba(255,255,255,0.75); }
        .article-content h2 { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: #00f0ff; margin: 50px 0 20px; position: relative; padding-left: 20px; }
        .article-content h2::before { content: ''; position: absolute; left: 0; top: 5px; width: 3px; height: calc(100% - 10px); background: linear-gradient(180deg, #00f0ff, #a855f7); border-radius: 2px; }
        .article-content h3 { font-size: 1.15rem; color: #a855f7; margin: 35px 0 15px; }
        .article-content p { margin-bottom: 20px; font-size: 0.95rem; }
        .article-content a { color: #00f0ff; text-decoration: none; border-bottom: 1px solid rgba(0,240,255,0.3); }
        .article-content code { background: rgba(0,240,255,0.08); padding: 2px 8px; border-radius: 4px; font-size: 0.9rem; color: #00f0ff; }
        .article-content pre { background: rgba(0,240,255,0.03); border: 1px solid rgba(0,240,255,0.1); border-radius: 12px; padding: 25px; margin: 25px 0; overflow-x: auto; font-size: 0.85rem; line-height: 1.6; }
        .article-content pre code { background: none; padding: 0; color: rgba(255,255,255,0.8); }
        .article-content blockquote { border-left: 3px solid #a855f7; padding: 15px 25px; margin: 25px 0; background: rgba(168,85,247,0.05); border-radius: 0 12px 12px 0; color: rgba(255,255,255,0.6); font-style: italic; }
        .article-content ul, .article-content ol { margin: 15px 0; padding-left: 25px; }
        .article-content li { margin-bottom: 8px; }
        .article-content hr { border: none; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,240,255,0.3), transparent); margin: 50px 0; }

        .not-found { text-align: center; padding: 200px 20px; color: rgba(255,255,255,0.3); }
        .not-found .icon { font-size: 4rem; margin-bottom: 20px; }

        /* 评论区 */
        .comments-section { max-width: 750px; margin: 0 auto; padding: 0 20px 80px; }
        .comments-title { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: #00f0ff; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .comments-count { background: rgba(0,240,255,0.1); padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; color: rgba(0,240,255,0.7); }

        .comment-form { margin-bottom: 40px; }
        .comment-form-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .comment-form input, .comment-form textarea {
            flex: 1;
            padding: 12px 16px;
            background: rgba(0,240,255,0.03);
            border: 1px solid rgba(0,240,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            font-family: 'Noto Sans SC', sans-serif;
            transition: border-color 0.3s;
        }
        .comment-form input:focus, .comment-form textarea:focus { border-color: rgba(0,240,255,0.4); }
        .comment-form input::placeholder, .comment-form textarea::placeholder { color: rgba(255,255,255,0.2); }
        .comment-form textarea { width: 100%; min-height: 100px; resize: vertical; margin-bottom: 12px; }
        .comment-form .btn-submit {
            padding: 10px 28px;
            background: linear-gradient(135deg, rgba(0,240,255,0.15), rgba(168,85,247,0.15));
            border: 1px solid rgba(0,240,255,0.4);
            border-radius: 50px;
            color: #00f0ff;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }
        .comment-form .btn-submit:hover { background: rgba(0,240,255,0.2); box-shadow: 0 0 20px rgba(0,240,255,0.15); }

        .comment-list { display: flex; flex-direction: column; gap: 16px; }
        .comment-item {
            background: rgba(0,240,255,0.02);
            border: 1px solid rgba(0,240,255,0.08);
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }
        .comment-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .comment-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #00f0ff, #a855f7);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 700; color: #000; flex-shrink: 0;
        }
        .comment-author { font-size: 0.9rem; color: #fff; font-weight: 500; }
        .comment-time { font-size: 0.75rem; color: rgba(255,255,255,0.25); margin-left: auto; }
        .comment-body { color: rgba(255,255,255,0.6); font-size: 0.9rem; line-height: 1.7; }
        .comment-delete {
            position: absolute; top: 15px; right: 15px;
            background: none; border: none; color: rgba(255,255,255,0.2);
            cursor: pointer; font-size: 0.8rem; transition: color 0.3s;
        }
        .comment-delete:hover { color: #ff4466; }

        .no-comments { text-align: center; padding: 40px; color: rgba(255,255,255,0.25); }

        .cursor-glow { position: fixed; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(0,240,255,0.06) 0%, transparent 70%); pointer-events: none; z-index: -1; transform: translate(-50%, -50%); transition: left 0.15s ease, top 0.15s ease; }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); }
        footer { text-align: center; padding: 40px; border-top: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); font-size: 0.8rem; letter-spacing: 2px; }

        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            .nav-links { gap: 15px; }
            .nav-links a { font-size: 0.75rem; }
            .article-header h1 { font-size: 1.5rem; }
            .article-header { padding: 120px 20px 40px; }
            .comment-form-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="starfield"></div>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="scanline"></div>

    <nav>
        <a href="index.html" class="logo">MY PLANET</a>
        <ul class="nav-links">
            <li><a href="index.html#home">首页</a></li>
            <li><a href="index.html#about">关于</a></li>
            <li><a href="blog.html" class="active">日志</a></li>
            <li><a href="admin.html">控制台</a></li>
        </ul>
    </nav>

    <div id="postArea"></div>

    <footer>© 2026 MY PLANET — ALL RIGHTS RESERVED</footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const postId = params.get('id');
        const postArea = document.getElementById('postArea');

        function getPosts() { return JSON.parse(localStorage.getItem('planet_posts') || '[]'); }
        function savePosts(posts) { localStorage.setItem('planet_posts', JSON.stringify(posts)); }

        function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

        function markdownToHtml(md) {
            let html = md
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                .replace(/^---$/gm, '<hr>')
                .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
                .replace(/^\- (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>')
                .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replace(/\n{2,}/g, '</p><p>')
                .replace(/\n/g, '<br>');
            return '<p>' + html + '</p>';
        }

        function renderPost(post) {
            document.title = post.title + ' | My Planet';
            postArea.innerHTML = `
                <article class="article-header">
                    <a href="blog.html" class="back-link">← 返回日志列表</a>
                    <div class="article-meta">
                        <span class="article-date">${new Date(post.createdAt).toLocaleDateString('zh-CN')}</span>
                        <div class="article-tags">
                            ${(post.tags || []).map(t => `<span class="article-tag">${escapeHtml(t.toUpperCase())}</span>`).join('')}
                        </div>
                    </div>
                    <h1>${escapeHtml(post.title)}</h1>
                </article>
                <div class="article-content">${markdownToHtml(post.content)}</div>
                <div class="comments-section">
                    <div class="comments-title">COMMENTS <span class="comments-count" id="commentCount">${(post.comments || []).length}</span></div>
                    <div class="comment-form">
                        <div class="comment-form-row">
                            <input type="text" id="commentName" placeholder="你的名字">
                        </div>
                        <textarea id="commentContent" placeholder="写下你的评论..."></textarea>
                        <button class="btn-submit" onclick="addComment()">发送</button>
                    </div>
                    <div class="comment-list" id="commentList"></div>
                </div>
            `;
            renderComments(post);
        }

        function renderComments(post) {
            const list = document.getElementById('commentList');
            const comments = post.comments || [];
            document.getElementById('commentCount').textContent = comments.length;

            if (comments.length === 0) {
                list.innerHTML = '<div class="no-comments">还没有评论，来说点什么吧</div>';
                return;
            }

            list.innerHTML = comments.sort((a, b) => b.time - a.time).map((c, i) => `
                <div class="comment-item">
                    <button class="comment-delete" onclick="deleteComment(${i})">✕</button>
                    <div class="comment-header">
                        <div class="comment-avatar">${escapeHtml(c.name.charAt(0).toUpperCase())}</div>
                        <span class="comment-author">${escapeHtml(c.name)}</span>
                        <span class="comment-time">${new Date(c.time).toLocaleString('zh-CN')}</span>
                    </div>
                    <div class="comment-body">${escapeHtml(c.content)}</div>
                </div>
            `).join('');
        }

        function addComment() {
            const name = document.getElementById('commentName').value.trim();
            const content = document.getElementById('commentContent').value.trim();
            if (!name || !content) return;

            let posts = getPosts();
            const idx = posts.findIndex(p => p.id === postId);
            if (idx === -1) return;

            if (!posts[idx].comments) posts[idx].comments = [];
            posts[idx].comments.push({ name, content, time: Date.now() });
            savePosts(posts);
            renderPost(posts[idx]);
            document.getElementById('commentContent').value = '';
        }

        function deleteComment(index) {
            let posts = getPosts();
            const idx = posts.findIndex(p => p.id === postId);
            if (idx === -1) return;
            posts[idx].comments.splice(index, 1);
            savePosts(posts);
            renderPost(posts[idx]);
        }

        if (!postId) {
            postArea.innerHTML = '<div class="not-found"><div class="icon">📡</div><p>未指定文章</p></div>';
        } else {
            const posts = getPosts();
            const post = posts.find(p => p.id === postId);
            if (!post) {
                postArea.innerHTML = '<div class="not-found"><div class="icon">🛸</div><p>文章未找到</p></div>';
            } else {
                renderPost(post);
            }
        }

        (function() {
            const field = document.getElementById('starfield');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 0.5;
                star.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${Math.random()*3+1}s;animation-delay:${Math.random()*3}s;`;
                field.appendChild(star);
            }
        })();
        const glow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', e => { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; });
    </script>
</body>
</html>
