<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑器 | Editor</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/effects.css">
    <link rel="stylesheet" href="css/editor.css">
</head>
<body>
    <div id="starfield"></div>
    <nav>
        <a href="index.html" class="logo">MY PLANET</a>
        <ul class="nav-links">
            <li><a href="index.html#home">首页</a></li>
            <li><a href="index.html#about">关于</a></li>
            <li><a href="index.html#skills">技能</a></li>
            <li><a href="blog.html">日志</a></li>
            <li><a href="admin.html" class="active">控制台</a></li>
            <li><a href="index.html#contact">联系</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="editor-header">
            <h1 id="editorTitle">// NEW POST</h1>
            <div class="editor-actions">
                <a href="admin.html" class="btn btn-back">← 返回</a>
                <button class="btn btn-draft" onclick="save('draft')">保存草稿</button>
                <button class="btn btn-publish" onclick="save('published')">发布</button>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">标题</label>
            <input type="text" class="title-input" id="postTitle" placeholder="输入文章标题...">
        </div>

        <div class="form-group">
            <label class="form-label">标签</label>
            <input type="text" class="tags-input" id="postTags" placeholder="tech, life, ai, design">
            <div class="tags-hint">用逗号分隔，例如：tech, life, ai</div>
        </div>

        <div class="editor-tabs">
            <button class="editor-tab active" onclick="switchTab('edit')">编辑</button>
            <button class="editor-tab" onclick="switchTab('preview')">预览</button>
        </div>

        <textarea class="content-area" id="postContent" placeholder="开始写作...&#10;&#10;支持 Markdown 语法：&#10;# 标题&#10;## 二级标题&#10;**粗体** *斜体*&#10;- 列表项&#10;> 引用&#10;`代码`&#10;```代码块```&#10;---"></textarea>
        <div class="preview-area" id="previewArea"></div>
    </div>

    <div id="toast" class="toast"></div>

    <footer>© 2026 MY PLANET — EDITOR</footer>

    <script src="js/core/utils.js"></script>
    <script src="js/core/markdown.js"></script>
    <script src="js/core/stars.js"></script>
    <script src="js/core/bg.js"></script>
    <script src="js/core/storage.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
