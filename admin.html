<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 | Admin Panel</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/effects.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div id="starfield"></div>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="scanline"></div>

    <nav>
        <a href="index.html" class="logo">MY PLANET</a>
        <ul class="nav-links">
            <li><a href="index.html#home">首页</a></li>
            <li><a href="index.html#about">关于</a></li>
            <li><a href="index.html#skills">技能</a></li>
            <li><a href="blog.html">日志</a></li>
            <li><a href="admin.html" class="active">控制台</a></li>
            <li><a href="index.html#contact">联系</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="panel-header">
            <div>
                <h1>// CONTROL CENTER</h1>
                <div class="stats" style="margin-top:8px;">共 <span id="totalCount">0</span> 篇文章 · <span id="publishedCount">0</span> 已发布 · <span id="draftCount">0</span> 草稿</div>
            </div>
            <a href="editor.html" class="btn-new">+ NEW POST</a>
        </div>
        <div class="post-list" id="postList"></div>

        <div style="margin-top:40px; display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn btn-publish" onclick="exportData()">导出数据</button>
            <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
            <button class="btn btn-draft" onclick="document.getElementById('importFile').click()">导入数据</button>
        </div>

        <div style="margin-top: 60px;">
            <h2 style="font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--cyan); margin-bottom: 25px;">// BACKGROUND SETTINGS</h2>
            <div class="bg-settings">
                <div class="bg-preview" id="bgPreview">
                    <span style="color: var(--text-muted); font-size: 0.85rem;">当前背景预览</span>
                </div>
                <div class="bg-controls">
                    <div class="form-group">
                        <label class="form-label">图片链接 (URL)</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" class="tags-input" id="bgUrl" placeholder="https://example.com/image.jpg" style="flex:1;">
                            <button class="btn btn-publish" onclick="applyBgUrl()" style="white-space:nowrap;">应用</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">或上传本地图片</label>
                        <input type="file" id="bgFile" accept="image/*" style="display:none;">
                        <button class="btn btn-draft" onclick="document.getElementById('bgFile').click()">选择文件</button>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button class="btn btn-back" onclick="resetBg()">恢复默认</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3>DELETE POST</h3>
            <p>确定要删除这篇文章吗？此操作不可撤销。</p>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm-delete" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <footer>© 2026 MY PLANET — CONTROL CENTER</footer>

    <script src="js/core/utils.js"></script>
    <script src="js/core/stars.js"></script>
    <script src="js/core/effects.js"></script>
    <script src="js/core/bg.js"></script>
    <script src="js/core/storage.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
