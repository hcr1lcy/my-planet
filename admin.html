<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 | Admin Panel</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/effects.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-box {
            background: rgba(10,14,42,0.95);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px; width: 90%;
            text-align: center;
        }
        .auth-box h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--cyan);
            margin-bottom: 10px;
        }
        .auth-box p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 25px;
        }
        .auth-box input {
            width: 100%;
            padding: 14px 18px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            margin-bottom: 15px;
            font-family: 'Noto Sans SC', sans-serif;
            transition: border-color 0.3s;
        }
        .auth-box input:focus { border-color: rgba(0,240,255,0.4); }
        .auth-box input::placeholder { color: var(--text-muted); }
        .auth-error {
            color: #ff4466;
            font-size: 0.8rem;
            margin-bottom: 15px;
            min-height: 20px;
        }
        .auth-box .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, rgba(0,240,255,0.2), rgba(168,85,247,0.2));
            border: 1px solid rgba(0,240,255,0.5);
            border-radius: 10px;
            color: var(--cyan);
            font-size: 0.95rem;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .auth-box .btn:hover {
            background: rgba(0,240,255,0.25);
            box-shadow: 0 0 20px rgba(0,240,255,0.15);
        }
        .auth-box .btn-logout {
            background: transparent;
            border-color: rgba(255,68,102,0.3);
            color: #ff4466;
            margin-top: 10px;
            font-family: 'Noto Sans SC', sans-serif;
            letter-spacing: 0;
        }
        .auth-box .btn-logout:hover {
            background: rgba(255,68,102,0.1);
        }
        #adminPanel { display: none; }
    </style>
</head>
<body>
    <div id="starfield"></div>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="scanline"></div>

    <nav>
        <a href="index.html" class="logo">MY PLANET</a>
        <ul class="nav-links">
            <li><a href="index.html#home">首页</a></li>
            <li><a href="index.html#about">关于</a></li>
            <li><a href="index.html#skills">技能</a></li>
            <li><a href="blog.html">日志</a></li>
            <li><a href="admin.html" class="active">控制台</a></li>
            <li><a href="index.html#contact">联系</a></li>
        </ul>
    </nav>

    <!-- 认证界面 -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h2 id="authTitle">// ACCESS</h2>
            <p id="authDesc">请输入密码以访问控制台</p>
            <div class="auth-error" id="authError"></div>
            <input type="password" id="authPassword" placeholder="密码">
            <button class="btn" id="authBtn" onclick="handleAuth()">登录</button>
        </div>
    </div>

    <!-- 管理面板 -->
    <div id="adminPanel">
        <div class="container">
            <div class="panel-header">
                <div>
                    <h1>// CONTROL CENTER</h1>
                    <div class="stats" style="margin-top:8px;">共 <span id="totalCount">0</span> 篇文章 · <span id="publishedCount">0</span> 已发布 · <span id="draftCount">0</span> 草稿</div>
                </div>
                <div style="display:flex; gap:10px; align-items:center;">
                    <button class="btn btn-logout" onclick="Auth.logout(); location.reload();" style="padding:8px 16px; font-size:0.8rem;">退出登录</button>
                    <a href="editor.html" class="btn-new">+ NEW POST</a>
                </div>
            </div>
            <div class="post-list" id="postList"></div>

            <div style="margin-top:40px; display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn btn-publish" onclick="exportData()">导出数据</button>
                <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
                <button class="btn btn-draft" onclick="document.getElementById('importFile').click()">导入数据</button>
            </div>

            <div style="margin-top: 60px;">
                <h2 style="font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--cyan); margin-bottom: 25px;">// BACKGROUND SETTINGS</h2>
                <div class="bg-settings">
                    <div class="bg-preview" id="bgPreview">
                        <span style="color: var(--text-muted); font-size: 0.85rem;">当前背景预览</span>
                    </div>
                    <div class="bg-controls">
                        <div class="form-group">
                            <label class="form-label">图片链接 (URL)</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="text" class="tags-input" id="bgUrl" placeholder="https://example.com/image.jpg" style="flex:1;">
                                <button class="btn btn-publish" onclick="applyBgUrl()" style="white-space:nowrap;">应用</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">或上传本地图片</label>
                            <input type="file" id="bgFile" accept="image/*" style="display:none;">
                            <button class="btn btn-draft" onclick="document.getElementById('bgFile').click()">选择文件</button>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 10px;">
                            <button class="btn btn-back" onclick="resetBg()">恢复默认</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3>DELETE POST</h3>
            <p>确定要删除这篇文章吗？此操作不可撤销。</p>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm-delete" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <footer>© 2026 MY PLANET — CONTROL CENTER</footer>

    <script src="js/core/utils.js"></script>
    <script src="js/core/stars.js"></script>
    <script src="js/core/effects.js"></script>
    <script src="js/core/bg.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/storage.js"></script>
    <script src="js/admin.js"></script>
    <script>
        var authState = Auth.requireAuth();
        var authOverlay = document.getElementById('authOverlay');
        var adminPanel = document.getElementById('adminPanel');
        var authTitle = document.getElementById('authTitle');
        var authDesc = document.getElementById('authDesc');
        var authBtn = document.getElementById('authBtn');
        var authError = document.getElementById('authError');

        if (authState === 'authenticated') {
            authOverlay.style.display = 'none';
            adminPanel.style.display = 'block';
        } else if (authState === 'setup') {
            authTitle.textContent = '// SET PASSWORD';
            authDesc.textContent = '首次访问，请设置管理员密码';
            authBtn.textContent = '设置密码';
        }

        async function handleAuth() {
            var pwd = document.getElementById('authPassword').value;
            if (!pwd) { authError.textContent = '请输入密码'; return; }
            if (pwd.length < 4) { authError.textContent = '密码至少4位'; return; }
            authError.textContent = '';

            if (authState === 'setup') {
                await Auth.setup(pwd);
                authOverlay.style.display = 'none';
                adminPanel.style.display = 'block';
            } else {
                var ok = await Auth.login(pwd);
                if (ok) {
                    authOverlay.style.display = 'none';
                    adminPanel.style.display = 'block';
                } else {
                    authError.textContent = '密码错误';
                    document.getElementById('authPassword').value = '';
                }
            }
        }

        document.getElementById('authPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleAuth();
        });
    </script>
</body>
</html>
